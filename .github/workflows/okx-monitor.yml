name: OKX Strategy Monitor (15min)

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests --quiet

      - name: Run monitor
        run: python okx_monitor.py
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN || '' }}

      - name: Get date for artifact
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload scan CSV (daily cumulative)
        uses: actions/upload-artifact@v4
        with:
          name: scan-data-${{ steps.date.outputs.date }}
          path: okx_data/scans/
          if-no-files-found: warn
          overwrite: true
