name: OKX Strategy Monitor

on:
  schedule:
    # 每小时整点执行 (UTC，北京时间对应 XX:00)
    - cron: '0 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests --quiet

      - name: Run monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python okx_monitor.py
